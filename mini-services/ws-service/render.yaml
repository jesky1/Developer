services:
  - type: web
    name: goalzone-ws-service
    runtime: docker
    dockerfilePath: ./mini-services/ws-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    branch: main
    envVars:
      - key: DATABASE_URL
        sync: false
        # Set this to your Supabase PostgreSQL connection string
        # Format: postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DATA_MODE
        value: mock
      - key: FOOTBALL_API_KEY
        sync: false
      - key: NEXT_API_URL
        sync: false
    healthCheckPath: /health
    env: docker
